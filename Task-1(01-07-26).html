<!DOCTYPE html>

<html>
    <head>
        <title>
            Task-1
        </title>
        
        <style>
            *{
                box-sizing: border-box;
            }

            body
            {
                background: white;
                padding: 20px;
                font-family: Arial, sans-serif;
            }

            figure 
            {
                border: 2px solid black;
                max-width: 900px;
                margin: 0 auto;
                padding: 15px;
            }

            header 
            {
                background: #da2c29;
                height: 80px;
                border: 2px solid black;
                margin-bottom: 12px;
            }

            nav 
            {
                background: #11b7c0;
                height: 80px;
                border: 2px solid black;
                margin-bottom: 12px;
            }

            main 
            {
                display: flex;
                gap: 12px;
                margin-bottom: 12px;
            }

            section 
            {
                display: flex;
                flex-direction: column;
                gap: 12px;
                flex: 1.2;
            }

            article 
            {
                background: #ffc966;
                height: 118px;
                border: 2px solid black;
            }

            article + article 
            {
                background: #ff9d4d;
            }

            aside 
            {
                background: #f966c8;
                border: 2px solid black;
                flex: 1;
            }

            footer 
            {
                background: #6e6e6e;
                height: 80px;
                border: 2px solid black;
            }
        </style>
    </head>

    <body>
        <figure>
            <header></header>

            <nav></nav>
                
            <main>
                <section>
                    <article></article>
                    <article></article>
                </section>
                <aside></aside>
            </main>

            <footer></footer>
        </figure>
        
    </body>
</html>
